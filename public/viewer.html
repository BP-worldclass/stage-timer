<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Timer — Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* 바깥 래퍼: 화면에 딱 맞는 16:9 박스 */
#outer{
  position:relative;
  background:#000;
  overflow:hidden;
}

/* 안쪽: 항상 1920×1080 기준, scale로 축소/확대 */
#stage{
  width:1920px;
  height:1080px;
  position:absolute;
  top:0;left:0;
  transform-origin:top left;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#000;
  transition:background .4s;
  padding:60px;
}

#logo{
  max-height:110px;
  max-width:600px;
  object-fit:contain;
  margin-bottom:32px;
  display:none;
}
#logo.show{display:block}

#title{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:72px;
  font-weight:300;
  color:rgba(255,255,255,.65);
  letter-spacing:4px;
  text-align:center;
  margin-bottom:20px;
  transition:color .3s,font-size .2s;
  max-width:1600px;
  line-height:1.3;
}
#speaker{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:44px;
  font-weight:300;
  color:rgba(255,255,255,.35);
  letter-spacing:2px;
  text-align:center;
  margin-bottom:20px;
  transition:color .3s,font-size .2s;
}
#time{
  font-family:'Bebas Neue',monospace;
  font-size:520px;
  color:#fff;
  line-height:0.9;
  letter-spacing:8px;
  text-align:center;
  transition:color .3s,font-size .2s;
}
#time.warn{color:#ffab40}
#time.neg{color:#ff1744}

#msg{
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:42px;
  font-weight:400;
  color:#fff;
  background:rgba(41,121,255,.88);
  padding:20px 60px;
  border-radius:10px;
  margin-top:40px;
  max-width:1600px;
  text-align:center;
  display:none;
  animation:fadeIn .25s ease;
  line-height:1.4;
}
#msg.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

#next-up{
  position:absolute;
  top:32px;left:40px;
  font-family:'IBM Plex Sans KR',sans-serif;
  font-size:20px;
  color:rgba(255,255,255,.22);
  line-height:1.9;
  text-align:left;
}
#next-label{
  font-size:16px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(255,255,255,.18);
  margin-bottom:4px;
}
#status-dot{
  position:absolute;
  top:38px;right:40px;
  width:14px;height:14px;
  border-radius:50%;
  background:#333;
  transition:background .3s;
}
#status-dot.live{background:#ff1744;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<style id="dynamic-style"></style>
<style id="custom-font-style"></style>

<div id="outer">
  <div id="stage">
    <div id="next-up"><div id="next-label"></div><div id="next-list"></div></div>
    <div id="status-dot"></div>
    <img id="logo" src="" alt="">
    <div id="title"></div>
    <div id="speaker"></div>
    <div id="time">--:--</div>
    <div id="msg"></div>
  </div>
</div>

<script>
let warnSecs=60, timers=[], curIdx=0;
let currentStyle={
  timeSize:520, titleSize:72, speakerSize:44,
  timeColor:'#ffffff', titleColor:'rgba(255,255,255,0.65)',
  speakerColor:'rgba(255,255,255,0.35)',
  warnColor:'#ffab40', negColor:'#ff1744',
  bgColor:'#000000', fontName:'', fontData:''
};

// 16:9 스케일 계산
function fitStage(){
  const W=1920, H=1080;
  const vw=window.innerWidth, vh=window.innerHeight;
  const scale=Math.min(vw/W, vh/H);
  const ow=W*scale, oh=H*scale;
  const outer=document.getElementById('outer');
  outer.style.width=ow+'px';
  outer.style.height=oh+'px';
  document.getElementById('stage').style.transform=`scale(${scale})`;
}
window.addEventListener('resize', fitStage);
fitStage();

function fmt(s){
  const neg=s<0,abs=Math.abs(s);
  const m=Math.floor(abs/60),sec=abs%60;
  return (neg?'-':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function colorCls(s){
  if(s<=10)return 'neg';
  if(s<=warnSecs)return 'warn';
  return '';
}
function applyTime(s){
  const el=document.getElementById('time');
  el.textContent=fmt(s);
  el.className=colorCls(s);
}
function applyTimers(ts,idx){
  timers=ts; curIdx=idx;
  const t=ts[idx];
  document.getElementById('title').textContent=t?t.title:'';
  document.getElementById('speaker').textContent=t?t.speaker:'';
  const upcoming=ts.slice(idx+1,idx+3);
  if(upcoming.length){
    document.getElementById('next-label').textContent='NEXT';
    document.getElementById('next-list').innerHTML=upcoming.map(x=>
      `${x.title}${x.speaker?' · '+x.speaker:''} <span style="opacity:.5">${String(x.duration).padStart(2,'0')}:00</span>`
    ).join('<br>');
  } else {
    document.getElementById('next-label').textContent='';
    document.getElementById('next-list').textContent='';
  }
}
function applyStyle(s){
  currentStyle={...currentStyle,...s};
  const st=currentStyle;
  const ff=st.fontName?`'CustomFont','IBM Plex Sans KR',sans-serif`:`'IBM Plex Sans KR',sans-serif`;
  const ffTime=st.fontName?`'CustomFont','Bebas Neue',monospace`:`'Bebas Neue',monospace`;
  const msgSize=Math.max(Math.round(st.titleSize*0.75), 28);
  document.getElementById('dynamic-style').textContent=`
    #stage{background:${st.bgColor}!important}
    #time{font-size:${st.timeSize}px;color:${st.timeColor};font-family:${ffTime}}
    #time.warn{color:${st.warnColor}}
    #time.neg{color:${st.negColor}}
    #title{font-size:${st.titleSize}px;color:${st.titleColor};font-family:${ff}}
    #speaker{font-size:${st.speakerSize}px;color:${st.speakerColor};font-family:${ff}}
    #msg{font-family:${ff};font-size:${msgSize}px}
  `;
  if(st.fontData&&st.fontName){
    document.getElementById('custom-font-style').textContent=
      `@font-face{font-family:'CustomFont';src:url('${st.fontData}')}`;
  }
}

function handleMsg(msg){
  if(msg.type==='fullState'){
    const s=msg.state;
    warnSecs=s.warnSecs||60;
    applyTimers(s.timers,s.curIdx);
    applyTime(s.remaining);
    if(s.style)applyStyle(s.style);
    document.getElementById('status-dot').className=s.running?'live':'';
    if(s.logo){const l=document.getElementById('logo');l.src=s.logo;l.className='show';}
    if(s.messageVisible){const m=document.getElementById('msg');m.textContent=s.message;m.className='show';}
  }
  else if(msg.type==='tick')applyTime(msg.remaining);
  else if(msg.type==='play'){applyTime(msg.remaining);document.getElementById('status-dot').className='live';}
  else if(msg.type==='pause')document.getElementById('status-dot').className='';
  else if(msg.type==='reset'){applyTime(msg.remaining);document.getElementById('status-dot').className='';}
  else if(msg.type==='select'){applyTimers(timers,msg.curIdx);applyTime(msg.remaining);document.getElementById('status-dot').className='';}
  else if(msg.type==='timers'){applyTimers(msg.timers,msg.curIdx);applyTime(msg.remaining);}
  else if(msg.type==='message'){
    const mel=document.getElementById('msg');
    mel.textContent=msg.text;
    mel.className=msg.visible?'show':'';
  }
  else if(msg.type==='logo'){
    const lel=document.getElementById('logo');
    if(msg.data){lel.src=msg.data;lel.className='show';}
    else{lel.src='';lel.className='';}
  }
  else if(msg.type==='warnSecs')warnSecs=msg.value;
  else if(msg.type==='style')applyStyle(msg.data);
}

window.addEventListener('message',e=>{
  try{handleMsg(typeof e.data==='string'?JSON.parse(e.data):e.data);}catch(err){}
});

const proto=location.protocol==='https:'?'wss':'ws';
const ws=new WebSocket(`${proto}://${location.host}`);
ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data));}catch(err){}};

document.addEventListener('click',()=>{
  if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
});
</script>
</body>
</html>
